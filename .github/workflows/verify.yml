name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - run: uv sync --locked

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: corepack enable && pnpm install --frozen-lockfile

      - run: bash scripts/verify-all
